# This workflow will build a golang project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-go

name: Go

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  build:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.23'
        check-latest: true
        cache-dependency-path: "**/*.sum"


    - name: Build
      run: go build -v ./...

    - name: Test
      run: go test -v ./...

  # The web UI (web/) is built into internal/web/dist and embedded into the
  # binary. This job keeps the SPA itself healthy (type-checks + builds it);
  # the committed dist is what the Go build above embeds.
  web:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Bun
      uses: oven-sh/setup-bun@v2

    - name: Install deps
      run: cd web && bun install --frozen-lockfile

    - name: Type-check
      run: cd web && bun run typecheck

    - name: Build UI
      run: cd web && bun run build
