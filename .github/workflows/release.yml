name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      # Build the web UI fresh so released binaries always embed the current SPA
      # (goreleaser's before-hook runs `bun run build` into internal/web/dist).
      - uses: oven-sh/setup-bun@v2

      - uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PUBLISHER_TOKEN: ${{ secrets.PUBLISHER_TOKEN }}
