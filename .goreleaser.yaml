version: 2

project_name: local-ci

# Build the embedded web UI (web/ → internal/web/dist) before compiling, so the
# released binaries always carry a freshly-built SPA regardless of what's
# committed. Requires Bun on the runner (see .github/workflows/release.yml).
# The second hook renders the cobra completion scripts to files so the
# archives (and the brew cask's completions stanza) can ship them.
before:
  hooks:
    - bash -c "cd web && bun install --frozen-lockfile && bun run build"
    - bash -c "mkdir -p completions && for sh in bash zsh fish powershell; do go run ./cmd/local-ci completion $sh > completions/local-ci.$sh; done"

builds:
  - main: ./cmd/local-ci/
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - formats: ["zip"]
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    files:
      - src: completions/*
        dst: completions

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"

homebrew_casks:
  - name: local-ci
    directory: Casks
    homepage: "https://github.com/MrPuls/local-ci"
    description: "Run Docker-based CI pipelines locally"
    binaries:
      - local-ci
    # Installed from the archive's completions/ dir (generated by the before
    # hook); brew links them into the right site-functions/completions dirs.
    completions:
      bash: completions/local-ci.bash
      zsh: completions/local-ci.zsh
      fish: completions/local-ci.fish
    hooks:
      post:
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/local-ci"]
          end
    repository:
      owner: MrPuls
      name: homebrew-local-ci
      token: "{{ .Env.PUBLISHER_TOKEN }}"
